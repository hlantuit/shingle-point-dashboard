name: Update Herschel Dashboard
on:
  workflow_dispatch:        # keep this if you already have it — lets you trigger manually
  schedule:
    - cron: '0 * * * *'     # runs at the top of every hour, UTC
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # -------------------------
      # 1. Checkout repository
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
      # -------------------------
      # 2. Setup Python
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # -------------------------
      # 3. Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # -------------------------
      # 4. Run dashboard script
      # -------------------------
      - name: Run dashboard update
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python dashboard_update.py
 
